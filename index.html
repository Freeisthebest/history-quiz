<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>近代史选择题刷题</title>
  <link rel="stylesheet" href="styles.css?v=20260702-2">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">近代史选择题题库</p>
        <h1 id="pageTitle">近代史选择题刷题</h1>
      </div>
      <div class="top-actions">
        <button id="homeBtn" class="button secondary" type="button">首页</button>
        <button id="examModeBtn" class="button secondary mode-button" type="button">模拟试卷</button>
        <button id="practiceModeBtn" class="button secondary mode-button" type="button">即时刷题</button>
        <button id="newPaperBtn" class="button secondary" type="button">重新组卷</button>
        <button id="bankBtn" class="button secondary" type="button">查看题库</button>
        <button id="markedBtn" class="button secondary" type="button">收藏栏</button>
        <button id="changelogBtn" class="button secondary" type="button">更新日志</button>
        <button id="historyBtn" class="button secondary" type="button">历史错题</button>
        <button id="submitBtn" class="button primary" type="button">交卷</button>
      </div>
    </header>

    <section id="errorBox" class="notice error hidden"></section>

    <section id="modeSelectPanel" class="mode-select-panel">
      <div class="mode-select-header">
        <p class="section-kicker">开始刷题</p>
        <h2>请选择本次练习方式</h2>
        <p id="modeSelectStats" class="muted"></p>
      </div>
      <div class="mode-grid">
        <button id="modeExamEntry" class="mode-card exam" type="button" data-start-mode="exam">
          <span class="mode-card-title">模拟试卷</span>
          <span class="mode-card-desc">随机抽取 40 道单选、20 道多选，整套答完后统一结算。</span>
          <span id="modeExamMeta" class="mode-card-meta"></span>
        </button>
        <button id="modePracticeEntry" class="mode-card practice" type="button" data-start-mode="practice">
          <span class="mode-card-title">即时刷题</span>
          <span class="mode-card-desc">随机抽题，答完一道立刻显示答案，适合逐题练习。</span>
          <span id="modePracticeMeta" class="mode-card-meta"></span>
        </button>
        <button id="modeWrongEntry" class="mode-card wrong" type="button" data-start-mode="wrong-practice">
          <span class="mode-card-title">错题重练</span>
          <span class="mode-card-desc">从历史错题中去重抽题，答完一道立刻反馈，方便回头巩固。</span>
          <span id="modeWrongMeta" class="mode-card-meta"></span>
        </button>
        <button id="modeMarkedEntry" class="mode-card marked" type="button" data-action="marked">
          <span class="mode-card-title">收藏栏</span>
          <span class="mode-card-desc">把需要重点记忆的题目标记起来，之后集中查看和取消标记。</span>
          <span id="modeMarkedMeta" class="mode-card-meta"></span>
        </button>
      </div>
      <div class="mode-select-actions">
        <button class="button light" type="button" data-action="bank">查看题库</button>
        <button class="button light" type="button" data-action="marked">收藏栏</button>
        <button class="button light" type="button" data-action="changelog">更新日志</button>
        <button class="button light" type="button" data-action="history">查看历史错题</button>
      </div>
    </section>

    <main id="examLayout" class="exam-layout hidden">
      <section class="question-column">
        <div id="summaryBar" class="summary-bar"></div>
        <article id="questionPanel" class="question-panel"></article>
        <section id="resultPanel" class="result-panel hidden"></section>
        <section id="historyPanel" class="history-panel hidden"></section>
        <section id="bankPanel" class="bank-panel hidden"></section>
        <section id="markedPanel" class="marked-panel hidden"></section>
        <section id="changelogPanel" class="changelog-panel hidden"></section>
      </section>

      <aside class="answer-sheet" aria-label="答题卡">
        <div class="sheet-header">
          <h2 id="sheetTitle">答题卡</h2>
          <p id="sheetStats"></p>
        </div>
        <div id="answerCard" class="answer-card"></div>
        <div class="legend">
          <span><i class="dot current"></i>当前</span>
          <span><i class="dot answered"></i>已答</span>
          <span><i class="dot correct"></i>正确</span>
          <span><i class="dot wrong"></i>错误</span>
          <span><i class="dot unanswered"></i>未答</span>
        </div>
      </aside>
    </main>
  </div>

  <script src="quiz-core.js?v=20260702-2"></script>
  <script src="questions.js?v=20260702-2"></script>
  <script src="app.js?v=20260702-2"></script>
</body>
</html>
